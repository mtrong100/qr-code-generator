<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- One UI 8 inspired: rounded square container with gradient, clean QR icon -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C67E3"/>
      <stop offset="100%" style="stop-color:#5B47C9"/>
    </linearGradient>
    <clipPath id="sq">
      <rect width="48" height="48" rx="12"/>
    </clipPath>
  </defs>
  <!-- Background -->
  <rect width="48" height="48" rx="12" fill="url(#bg)"/>
  <!-- QR code icon (simplified) -->
  <!-- Top-left finder -->
  <rect x="9" y="9" width="12" height="12" rx="2.5" fill="white"/>
  <rect x="11" y="11" width="8" height="8" rx="1.5" fill="#5B47C9"/>
  <rect x="13" y="13" width="4" height="4" rx=".75" fill="white"/>
  <!-- Top-right finder -->
  <rect x="27" y="9" width="12" height="12" rx="2.5" fill="white"/>
  <rect x="29" y="11" width="8" height="8" rx="1.5" fill="#5B47C9"/>
  <rect x="31" y="13" width="4" height="4" rx=".75" fill="white"/>
  <!-- Bottom-left finder -->
  <rect x="9" y="27" width="12" height="12" rx="2.5" fill="white"/>
  <rect x="11" y="29" width="8" height="8" rx="1.5" fill="#5B47C9"/>
  <rect x="13" y="31" width="4" height="4" rx=".75" fill="white"/>
  <!-- Data dots bottom-right area -->
  <rect x="27" y="27" width="4" height="4" rx="1" fill="white"/>
  <rect x="33" y="27" width="4" height="4" rx="1" fill="white"/>
  <rect x="39" y="27" width="4" height="4" rx="1" fill="white" opacity="0"/>
  <rect x="27" y="33" width="4" height="4" rx="1" fill="white"/>
  <rect x="33" y="33" width="4" height="4" rx="1" fill="white" opacity=".5"/>
  <rect x="27" y="39" width="4" height="4" rx="1" fill="white" opacity=".5"/>
  <rect x="33" y="39" width="4" height="4" rx="1" fill="white"/>
</svg>
